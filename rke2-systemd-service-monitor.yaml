## Optional RKE2 service alerts. If node-exporter is running with the systemd collector enabled, add:

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: rke2-systemd-service-monitor
  namespace: cattle-monitoring-system
  labels:
    app: rke2-systemd-service-monitor
    release: rancher-monitoring
spec:
  groups:
    - name: rke2.control-plane.health
      rules:
        - alert: RKE2ServerServiceDown
        expr: node_systemd_unit_state{name="rke2-server.service",state="active"} == 0
        for: 5m
        labels:
          severity: critical
          component: rke2-server
        annotations:
          summary: "rke2-server service is not active"
          description: "rke2-server.service is not active on {{ $labels.instance }}."
    - name: rke2-agent.health
      rules:
        - alert: RKE2AgentServiceDown
        expr: node_systemd_unit_state{name="rke2-agent.service",state="active"} == 0
        for: 5m
        labels:
          severity: critical
          component: rke2-agent
        annotations:
          summary: "rke2-agent service is not active"
          description: "rke2-agent.service is not active on {{ $labels.instance }}."
